name: Kairon Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kairon-alert
  cancel-in-progress: false

jobs:
  revisar-usados:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar monitor
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Revisar Kairon
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --once --notify-start

      - name: Guardar productos vistos
        run: |
          git config user.name "Kairon Alert"
          git config user.email "kairon-alert@users.noreply.github.com"
          git add -f state.json
          if ! git diff --cached --quiet; then
            git commit -m "Actualizar productos vistos"
            git push
          fi
